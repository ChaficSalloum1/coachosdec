# Approve Booking Request Test
# Verifies the full booking workflow: student submits a request,
# coach sees it in Requests tab and approves it, lesson appears in Today.
#
# PRE-REQUISITE: Coach must be signed in with an availability schedule set.
# The test submits a booking as a student (via the in-app public booking preview)
# then switches to the coach view to approve it.

appId: ${APP_ID}

---
- launchApp

# Sign in as coach
- assertVisible: "CoachOS"
- tapOn: "your@email.com"
- inputText: "${COACH_A_EMAIL}"
- tapOn: "••••••••"
- inputText: "${COACH_A_PASSWORD}"
- tapOn: "Sign In"

- waitForAnimationToEnd
- assertVisible: "Today"

# Open the public booking preview (simulates student experience)
- tapOn: "Settings"
- assertVisible: "Booking Link"
- tapOn: "Preview student booking page"

# Select first available slot
- assertVisible: "Available Times"
- tapOn:
    index: 0
    text: ":"   # first time slot (contains ":")

# Fill in student details
- assertVisible: "Your Name"
- tapOn: "Your Name"
- inputText: "Booking Test Student"
- tapOn: "Contact"
- inputText: "booking@test.com"
- tapOn: "Send Booking Request"

# Confirm success and go back
- waitForAnimationToEnd

# Navigate to Requests tab
- tapOn: "Requests"
- assertVisible: "Booking Test Student"

# Approve the request (swipe right or tap Approve)
- tapOn: "Approve"
- tapOn: "Confirm"

# Verify it no longer shows as pending
- assertNotVisible: "Pending"

# Verify lesson was created on Today screen
- tapOn: "Today"
- assertVisible: "Booking Test Student"
