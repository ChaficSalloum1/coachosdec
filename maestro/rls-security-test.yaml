# RLS Security Test - CRITICAL
# This test verifies that Row Level Security policies work correctly
# After implementing RLS policies, Coach A should NOT be able to see Coach B's data
#
# SETUP REQUIRED:
# 1. Update .maestro.yaml with your test account credentials and bundle ID
# 2. Create two test coach accounts in Supabase Authentication
# 3. Build the app first: npx expo run:ios or npx expo run:android

appId: ${APP_ID}

---
- launchApp

# Step 1: Login as Coach A
- tapOn: "Settings"  # Navigate to settings/login
- tapOn: "Login"  # Or "Sign In" button
- inputText: "${COACH_A_EMAIL}"
- tapOn: "Password"
- inputText: "${COACH_A_PASSWORD}"
- tapOn: "Sign In"

# Wait for login to complete
- assertVisible: "Today"  # Should see main app screen

# Step 2: Create a student as Coach A
- tapOn: "Students"
- tapOn: "Add Student"  # Or "+" button
- inputText: "Coach A Student"
- tapOn: "Contact"
- inputText: "coacha-student@test.com"
- tapOn: "Save"

# Verify student was created
- assertVisible: "Coach A Student"

# Step 3: Logout
- tapOn: "Settings"
- scroll
- tapOn: "Logout"  # Or "Sign Out"

# Step 4: Login as Coach B
- tapOn: "Login"
- inputText: "${COACH_B_EMAIL}"
- tapOn: "Password"
- inputText: "${COACH_B_PASSWORD}"
- tapOn: "Sign In"

# Wait for login
- assertVisible: "Today"

# Step 5: Verify Coach B CANNOT see Coach A's student
# This is the critical security check - if RLS is working, this should fail
- tapOn: "Students"

# CRITICAL ASSERTION: Coach A's student should NOT be visible
- assertNotVisible: "Coach A Student"

# Step 6: Create Coach B's own student to verify they CAN create data
- tapOn: "Add Student"
- inputText: "Coach B Student"
- tapOn: "Contact"
- inputText: "coachb-student@test.com"
- tapOn: "Save"

# Verify Coach B can see their own student
- assertVisible: "Coach B Student"

# Step 7: Verify Coach B still cannot see Coach A's student
- assertNotVisible: "Coach A Student"

# Test passed if:
# - Coach B cannot see "Coach A Student"
# - Coach B can see "Coach B Student"
# If Coach B CAN see Coach A's student, RLS policies are NOT working correctly!
#
# HOW TO RUN:
# 1. Update .maestro.yaml with your bundle ID and test account credentials
# 2. Build the app: npx expo run:ios or npx expo run:android
# 3. Run: maestro test maestro/rls-security-test.yaml
# 4. Or run all tests: npm run test:maestro
#
# NOTE: All credentials are now managed in .maestro.yaml - update them there!

