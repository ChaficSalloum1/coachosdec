# Navigation Test
# Tests basic navigation between main tabs

appId: com.yourcompany.vibecode  # UPDATE THIS with your actual app bundle ID

---
- launchApp

# If not logged in, login first
- tapOn: "Settings"
- tapOn: "Login"
- inputText: "coach-a@test.com"  # UPDATE with your test email
- tapOn: "Password"
- inputText: "password123"  # UPDATE with your test password
- tapOn: "Sign In"

# Test Today tab
- tapOn: "Today"
- assertVisible: "Today"  # Or some content on Today screen

# Test Requests tab
- tapOn: "Requests"
- assertVisible: "Requests"  # Or "Pending Requests" or empty state

# Test Students tab
- tapOn: "Students"
- assertVisible: "Students"  # Or student list or empty state

# Test Settings tab
- tapOn: "Settings"
- assertVisible: "Settings"  # Or settings content

# Navigate back to Today
- tapOn: "Today"
- assertVisible: "Today"

